name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      SEARCH_SERVICE_PROVIDER: postgres
      SEARCH_SERVICE_URL: http://127.0.0.1:8080/api/search

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run verify:search-contract
      - run: npm run verify:demo
      - run: npm run smoke:search-service
      - run: npm run test:ingestion
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e -- --reporter=line
